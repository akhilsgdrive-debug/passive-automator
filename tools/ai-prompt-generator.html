<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Prompt Generator — Create Powerful Prompts | Passive Automator</title><meta name="description" content="Free AI Prompt Generator for ChatGPT, Claude, Grok."><link rel="canonical" href="https://akhilsgdrive-debug.github.io/passive-automator/tools/ai-prompt-generator.html"><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/css/style.css"></head>
<body class="bg-slate-950 text-slate-100"><nav class="glass-strong border-b border-white/10 sticky top-0 z-50"><div class="max-w-screen-xl mx-auto px-6 py-4 flex justify-between"><a href="../index.html" class="flex items-center gap-x-3"><div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center"><span class="font-bold">PA</span></div><span class="font-semibold">Passive Automator</span></a><a href="../tools.html" class="text-sm text-slate-300 hover:text-white">← Back</a></div></nav><div class="max-w-screen-xl mx-auto px-6 pt-10 pb-16"><div class="max-w-4xl mx-auto"><div class="flex items-center gap-x-4 mb-8"><div class="text-6xl">✨</div><div><h1 class="text-5xl font-semibold tracking-tighter">AI Prompt Generator</h1><p class="text-xl text-slate-300">Create powerful prompts for any LLM</p></div></div><div class="glass-strong rounded-3xl p-8"><div class="grid md:grid-cols-2 gap-6"><div><label class="text-sm font-medium text-slate-300">Task / Goal</label><input id="task" type="text" class="input w-full mt-2 px-5 py-3 rounded-2xl" value="Explain quantum computing simply"><label class="text-sm font-medium text-slate-300 mt-5 block">Role / Persona</label><input id="role" type="text" class="input w-full mt-2 px-5 py-3 rounded-2xl" value="You are a world-class educator"><button onclick="generatePrompt()" class="mt-6 w-full btn btn-primary py-4">Generate Powerful Prompt</button></div><div><label class="text-sm font-medium text-slate-300">Generated Prompt</label><textarea id="result" class="input w-full h-64 mt-2 p-5 rounded-2xl font-mono text-sm" readonly></textarea><div class="flex gap-3 mt-4"><button onclick="copyPrompt()" class="flex-1 btn btn-secondary">Copy Prompt</button><button onclick="useInChatGPT()" class="flex-1 btn btn-secondary">Open in ChatGPT</button></div></div></div></div></div></div><script src="../assets/js/utils.js"></script><script>function generatePrompt(){const task=document.getElementById('task').value.trim();const role=document.getElementById('role').value.trim();if(!task)return Utils.showToast('Please enter a task','error');const prompt=`${role}. ${task}. Provide a clear, structured, and actionable response.`;document.getElementById('result').value=prompt;}async function copyPrompt(){const text=document.getElementById('result').value;if(!text)return;await Utils.copyToClipboard(text);}function useInChatGPT(){const text=document.getElementById('result').value;if(!text)return;window.open(`https://chat.openai.com/?q=${encodeURIComponent(text)}`,'_blank');}function init(){Utils.initNavbar();}window.onload=init;</script></body></html>
