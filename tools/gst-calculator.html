<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GST Calculator India — Calculate GST, CGST, SGST Instantly | Passive Automator</title><meta name="description" content="Free GST Calculator for India. Instantly calculate GST amount, CGST, SGST breakdown and final price."><link rel="canonical" href="https://akhilsgdrive-debug.github.io/passive-automator/tools/gst-calculator.html"><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/css/style.css"></head>
<body class="bg-slate-950 text-slate-100"><nav class="glass-strong border-b border-white/10 sticky top-0 z-50"><div class="max-w-screen-xl mx-auto px-6 py-4 flex justify-between items-center"><a href="../index.html" class="flex items-center gap-x-3"><div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center"><span class="font-bold">PA</span></div><span class="font-semibold">Passive Automator</span></a><a href="../tools.html" class="text-sm text-slate-300 hover:text-white">← All Tools</a></div></nav><div class="max-w-screen-xl mx-auto px-6 pt-10 pb-16"><div class="max-w-3xl mx-auto"><div class="flex items-center gap-x-4 mb-8"><div class="text-6xl">🧡</div><div><h1 class="text-5xl font-semibold tracking-tighter">GST Calculator</h1><p class="text-xl text-slate-300 mt-1">Calculate GST, CGST & SGST for India</p></div></div><div class="glass-strong rounded-3xl p-8"><div class="grid md:grid-cols-2 gap-8"><div class="space-y-6"><div><label class="block text-sm font-medium text-slate-300 mb-2">Amount (₹)</label><input type="number" id="amount" value="10000" class="input w-full px-5 py-3.5 rounded-2xl text-lg"></div><div><label class="block text-sm font-medium text-slate-300 mb-2">GST Rate (%)</label><select id="gst-rate" class="input w-full px-5 py-3.5 rounded-2xl text-lg"><option value="5">5% (Essential items)</option><option value="12">12%</option><option value="18" selected>18% (Most common)</option><option value="28">28% (Luxury items)</option></select></div><button onclick="calculateGST()" class="w-full btn btn-primary py-4 text-base">Calculate GST</button></div><div id="gst-results" class="hidden"><div class="result-box space-y-4"><div class="flex justify-between"><span class="text-slate-400">Original Amount</span> <span id="original" class="font-semibold"></span></div><div class="flex justify-between"><span class="text-slate-400">GST Amount</span> <span id="gst-amount" class="font-semibold text-amber-400"></span></div><div class="pt-3 border-t border-white/10 flex justify-between text-lg"><span class="font-medium">Total Amount</span> <span id="total" class="font-bold text-emerald-400"></span></div><div class="pt-4 border-t border-white/10 text-sm"><div class="flex justify-between"><span>CGST (50%)</span> <span id="cgst"></span></div><div class="flex justify-between"><span>SGST (50%)</span> <span id="sgst"></span></div></div></div><div class="flex gap-3 mt-5"><button onclick="copyGSTResults()" class="flex-1 btn btn-secondary text-sm py-3">Copy Results</button><button onclick="shareGSTResults()" class="flex-1 btn btn-secondary text-sm py-3">Share</button></div></div></div></div></div></div><script src="../assets/js/utils.js"></script><script>function calculateGST(){const amount=parseFloat(document.getElementById('amount').value);const rate=parseFloat(document.getElementById('gst-rate').value);if(!amount||amount<=0){Utils.showToast('Please enter a valid amount','error');return;}const gstAmount=(amount*rate)/100;const total=amount+gstAmount;const cgst=gstAmount/2;const sgst=gstAmount/2;document.getElementById('original').innerHTML=`₹${Utils.formatNumber(amount,0)}`;document.getElementById('gst-amount').innerHTML=`₹${Utils.formatNumber(gstAmount,2)}`;document.getElementById('total').innerHTML=`₹${Utils.formatNumber(total,2)}`;document.getElementById('cgst').innerHTML=`₹${Utils.formatNumber(cgst,2)}`;document.getElementById('sgst').innerHTML=`₹${Utils.formatNumber(sgst,2)}`;document.getElementById('gst-results').classList.remove('hidden');}async function copyGSTResults(){const total=document.getElementById('total').textContent;await Utils.copyToClipboard(`GST Calculation: Total = ${total}`);}async function shareGSTResults(){await Utils.shareContent('My GST Calculation','Check my GST calculation',window.location.href);}function init(){Utils.initNavbar();setTimeout(()=>calculateGST(),500);}window.onload=init;</script></body></html>
