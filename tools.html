<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All AI Tools — Passive Automator | Free Online Calculators & Generators</title>
    <meta name="description" content="Browse our complete collection of free AI-powered tools, calculators, and automation utilities. 10+ production-ready tools to boost productivity and passive income.">
    <link rel="canonical" href="https://akhilsgdrive-debug.github.io/passive-automator/tools.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 glass-strong border-b border-white/10">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <a href="index.html" class="flex items-center gap-x-3">
                    <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-blue-500 via-violet-500 to-cyan-400 flex items-center justify-center"><span class="text-white font-bold text-xl tracking-tighter">PA</span></div>
                    <span class="font-semibold text-xl">Passive Automator</span>
                </a>
            </div>
            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a href="index.html" class="text-slate-300 hover:text-white">Home</a>
                <a href="tools.html" class="nav-active">Tools</a>
                <a href="blog.html" class="text-slate-300 hover:text-white">Blog</a>
                <a href="categories.html" class="text-slate-300 hover:text-white">Categories</a>
            </div>
            <div><a href="index.html#newsletter" class="btn btn-primary text-sm px-6">Get Started</a></div>
        </div>
    </nav>

    <div class="pt-20 pb-16 max-w-screen-2xl mx-auto px-8">
        <div class="max-w-3xl"><div class="uppercase text-blue-400 text-xs tracking-[3px] font-semibold mb-3">DISCOVER</div><h1 class="text-5xl font-semibold tracking-tighter">All Tools</h1><p class="mt-4 text-xl text-slate-300">Powerful, free, and built for real results. Every tool works instantly in your browser.</p></div>
        
        <div class="mt-10 flex flex-col md:flex-row gap-4">
            <div class="flex-1"><input type="text" id="tool-search" placeholder="Search tools..." class="input w-full px-5 py-3.5 rounded-2xl text-sm"></div>
            <div class="flex gap-2 flex-wrap" id="category-filters"></div>
        </div>
        
        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="tools-grid"></div>
        <div id="no-results" class="hidden text-center py-12"><p class="text-slate-400">No tools found matching your search.</p></div>
    </div>

    <footer class="border-t border-white/10 py-8 text-center text-xs text-slate-500">© 2026 Passive Automator • <a href="index.html" class="hover:text-white">Home</a></footer>

    <script src="assets/js/utils.js"></script>
    <script>
        let allTools = [];
        let currentFilter = 'all';
        
        async function loadTools() {
            const res = await fetch('data/tools.json');
            const data = await res.json();
            allTools = data.tools;
            renderTools(allTools);
            renderCategoryFilters();
        }
        
        function renderCategoryFilters() {
            const container = document.getElementById('category-filters');
            const categories = [...new Set(allTools.map(t => t.category))];
            let html = `<button onclick="filterByCategory('all')" class="category-btn active px-5 py-2 text-sm rounded-2xl border border-white/20 bg-white/5">All</button>`;
            categories.forEach(cat => { html += `<button onclick="filterByCategory('${cat}')" class="category-btn px-5 py-2 text-sm rounded-2xl border border-white/10 hover:bg-white/5 transition-colors">${cat}</button>`; });
            container.innerHTML = html;
        }
        
        function filterByCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-white/5', 'border-white/20');
                btn.classList.add('border-white/10');
                if ((category === 'all' && btn.textContent === 'All') || btn.textContent === category) {
                    btn.classList.add('active', 'bg-white/5', 'border-white/20');
                    btn.classList.remove('border-white/10');
                }
            });
            applyFilters();
        }
        
        function applyFilters() {
            const searchTerm = document.getElementById('tool-search').value.toLowerCase().trim();
            let filtered = allTools;
            if (currentFilter !== 'all') filtered = filtered.filter(t => t.category === currentFilter);
            if (searchTerm) filtered = filtered.filter(t => t.name.toLowerCase().includes(searchTerm) || t.description.toLowerCase().includes(searchTerm));
            renderTools(filtered);
        }
        
        function renderTools(tools) {
            const grid = document.getElementById('tools-grid');
            const noResults = document.getElementById('no-results');
            if (tools.length === 0) { grid.innerHTML = ''; noResults.classList.remove('hidden'); return; }
            noResults.classList.add('hidden');
            grid.innerHTML = tools.map(tool => `
                <a href="${tool.url}" class="tool-card group rounded-3xl p-7 flex flex-col h-full border border-white/10 hover:border-blue-500/30">
                    <div class="flex justify-between items-start mb-5"><div class="text-5xl">${tool.icon}</div><div class="px-3.5 py-1 text-xs rounded-full bg-white/5 text-slate-400">${tool.category}</div></div>
                    <h3 class="font-semibold text-2xl tracking-tight mb-2 group-hover:text-blue-400">${tool.name}</h3>
                    <p class="text-sm text-slate-400 flex-1">${tool.description}</p>
                    <div class="mt-auto pt-6 flex items-center justify-between text-xs"><div class="flex items-center gap-x-1.5 text-emerald-400"><div class="w-1.5 h-1.5 bg-emerald-400 rounded-full"></div><span>${tool.usageCount.toLocaleString()} uses</span></div><span class="font-medium text-blue-400 group-hover:underline">Open tool →</span></div>
                </a>`).join('');
        }
        
        function initSearch() {
            const searchInput = document.getElementById('tool-search');
            searchInput.addEventListener('input', Utils.debounce(applyFilters, 200));
        }
        
        async function init() { await loadTools(); initSearch(); Utils.initNavbar(); }
        window.onload = init;
    </script>
</body>
</html>
