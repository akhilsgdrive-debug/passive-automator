<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — AI, Automation & Passive Income Insights | Passive Automator</title>
    <meta name="description" content="Read the latest articles on AI tools, content creation, SEO strategies, and building passive income streams.">
    <link rel="canonical" href="https://akhilsgdrive-debug.github.io/passive-automator/blog.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-950">
    <nav class="glass-strong border-b border-white/10 sticky top-0 z-50"><div class="max-w-screen-2xl mx-auto px-8 py-5 flex justify-between items-center"><a href="index.html" class="flex items-center gap-x-3"><div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center"><span class="font-bold">PA</span></div><span class="font-semibold text-xl">Passive Automator</span></a><div class="flex gap-x-6 text-sm"><a href="tools.html" class="hover:text-white text-slate-300">Tools</a><a href="blog.html" class="text-white font-medium">Blog</a></div></div></nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-12 pb-20"><div class="max-w-2xl"><h1 class="text-6xl font-semibold tracking-tighter">Blog</h1><p class="mt-3 text-xl text-slate-300">Insights on AI, automation, content, and building sustainable income.</p></div><div class="mt-10 grid md:grid-cols-2 lg:grid-cols-3 gap-7" id="blog-list"></div></div>

    <script src="assets/js/utils.js"></script>
    <script>
        async function loadBlogPosts() {
            const res = await fetch('data/posts.json');
            const data = await res.json();
            const container = document.getElementById('blog-list');
            container.innerHTML = data.posts.map(post => `
                <a href="blog/${post.slug}.html" class="blog-card group block glass rounded-3xl overflow-hidden">
                    <div class="h-48 bg-slate-800"><img src="${post.image}" class="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-500" alt=""></div>
                    <div class="p-7"><div class="flex items-center justify-between text-xs mb-3"><span class="px-3 py-1 rounded-full bg-white/5">${post.category}</span><span class="text-slate-500">${post.readTime} min</span></div><h3 class="font-semibold text-[21px] leading-tight tracking-tight mb-3 group-hover:text-blue-400">${post.title}</h3><p class="text-sm text-slate-400 line-clamp-3">${post.excerpt}</p><div class="mt-6 flex items-center text-xs"><img src="${post.authorAvatar}" class="w-6 h-6 rounded-full mr-2" alt=""><span class="text-slate-400">${post.author} • ${new Date(post.publishDate).toLocaleDateString('en-US', {month:'short', day:'numeric'})}</span></div></div>
                </a>`).join('');
        }
        function init() { loadBlogPosts(); Utils.initNavbar(); }
        window.onload = init;
    </script>
</body>
</html>
